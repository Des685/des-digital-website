<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent – Des Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e0e0e0;
      padding: 60px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #eaf3de;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 500;
      color: #2C2C2A;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #888780;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      padding: 12px 32px;
      background: #2C2C2A;
      color: #F1EFE8;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover { background: #444441; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>Message sent!</h1>
    <p>Thanks for reaching out. I'll get back to you within 24 hours.</p>
    <a href="index.html">Back to home</a>
  </div>
</body>
</html>
